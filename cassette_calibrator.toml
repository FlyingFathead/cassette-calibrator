[gen]
out = "data/test_audio.wav"
dtmf_ramp_ms = 5.0
marker_start = "D#B*"
marker_end   = "*B#D"
sr = 44100
pre_s = 3.0
post_s = 1.0
pad_s = 0.30
noisewin_s = 2.0
marker_dbfs = -12.0
countdown = true
tone_hz = 1000.0
tone_s = 10.0
tone_dbfs = -18.0
f1 = 20.0
f2 = 20000.0
sweep_s = 30.0
sweep_dbfs = -20.0
peak = 0.90
spoken_cues = true
spoken_cues_dir = "data/voice_cues"
spoken_cues_pad_s = 1.0
spoken_cues_dbfs = -14.0
spoken_cues_autogen = true
spoken_cues_regen = false
write_sidecar_json = true

[sidecar]
recursive = true
force = false

[voicecues]
outdir = "data/voice_cues"
force = false

[detect]
marker_start = "D#B*"
marker_end   = "*B#D"
channel = "mono"
win_ms = 40.0
hop_ms = 10.0
thresh = 6.0
min_dbfs = -55.0
marker_channel = "mono"

[analyze]
outdir = "data/cassette_results"
marker_start = "D#B*"
marker_end   = "*B#D"
noisewin_s   = 2.0
pad_s        = 0.30
countdown    = true
countdown_from = 10
tone_s       = 10.0
sweep_s      = 30.0
marker_tone_s = 0.22
marker_gap_s  = 0.04
channels = "stereo"
marker_channel = "mono"
drift_warn = 0.002
fine_align = true
ir_win_s = 0.25
smooth_oct = 12
f_plot_min = 20.0
f_plot_max = 20000.0
lock_y_axis = true
plot_y_min = -35.0
plot_y_max = 5.0
lr_overlay = true
lr_overlay_color_l = "tab:blue"
lr_overlay_color_r = "tab:orange"

[analyze.snr]
noise_s = 1.0
tone_s = 3.0

[presets.noisy_cassette.detect]
min_dbfs = -45.0
thresh = 5.0
marker_channel = "mono"

[presets.line_in.detect]
min_dbfs = -28.0
thresh = 7.0
marker_channel = "mono"

[presets.aggressive.detect]
min_dbfs = -55.0
thresh = 4.0
marker_channel = "mono"

[presets.walkman.gen]
marker_dbfs = -10.0
sweep_dbfs = -28.0

[presets.walkman.analyze]
smooth_oct = 6

[presets.walkman.analyze.snr]
tone_s = 2.0

[webui]
host = "127.0.0.1"
port = 8765
open_browser = true
url_prefix = ""
legacy_run_plot_fallback_from_config = true

root_dir = "data"
restrict_to_root_dir = true
allow_project_root_access = false

# Restrict where Step 1 test WAVs may be written
restrict_gen_out_to_dir = true
gen_out_root_dir = "data/gen_test_audio"

# Optional: suggest a timestamped test WAV name in the WebUI
# using the browser's local time, to reduce accidental overwrite.
propose_timestamped_test_audio_default = true

warn_on_overwrite = true
